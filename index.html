<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🎡 Karar Çarkı</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #2d1b3a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border-radius: 42px;
      padding: 30px 25px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #ffe9b0;
      font-weight: 600;
      font-size: 2.4rem;
      letter-spacing: 2px;
      margin-bottom: 15px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .wheel-wrapper {
      position: relative;
      margin: 10px 0 20px;
    }
    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 50%;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.7), 0 0 30px rgba(255, 215, 0, 0.3);
      background: #222;
      transition: box-shadow 0.3s;
    }
    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.8rem;
      filter: drop-shadow(0 8px 10px black);
      z-index: 10;
      color: #ffd966;
      text-shadow: 0 0 10px gold;
      line-height: 1;
    }
    .result-area {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 12px 28px;
      margin: 15px 0 20px;
      font-size: 1.6rem;
      font-weight: bold;
      color: #fce38a;
      border: 1px solid rgba(255,255,200,0.4);
      text-align: center;
      min-height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .input-section {
      display: flex;
      gap: 10px;
      width: 100%;
      margin: 10px 0 5px;
    }
    #optionInput {
      flex: 1;
      padding: 14px 20px;
      border-radius: 50px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 1.1rem;
      outline: none;
      border: 1px solid rgba(255,255,255,0.25);
      transition: 0.25s;
    }
    #optionInput::placeholder {
      color: #ccc;
      font-style: italic;
    }
    #optionInput:focus {
      border-color: #ffb347;
      background: rgba(255,255,255,0.22);
    }
    .btn {
      background: #ffb347;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-weight: bold;
      font-size: 1rem;
      color: #1a1a2e;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #f9d56e, #f8b042);
      box-shadow: 0 6px 0 #b4450c, 0 8px 20px rgba(0,0,0,0.4);
      border: 1px solid #ffdd99;
      letter-spacing: 0.5px;
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #b4450c, 0 5px 12px black;
    }
    .btn.secondary {
      background: #4e4376;
      box-shadow: 0 6px 0 #2a2042;
      border-color: #7e6bb0;
      color: #f0e9ff;
      background: linear-gradient(135deg, #5d5090, #3a325e);
    }
    .spin-btn {
      background: #f05454;
      box-shadow: 0 6px 0 #931a1a;
      border-color: #ff8a8a;
      font-size: 1.3rem;
      padding: 16px 36px;
      background: linear-gradient(135deg, #f97b7b, #d93b3b);
      color: white;
      margin: 8px 0 5px;
    }
    .options-list {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 15px 0 5px;
      justify-content: center;
    }
    .option-chip {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 30px;
      color: #eee;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.25);
      font-size: 0.95rem;
    }
    .remove-chip {
      cursor: pointer;
      color: #ffa5a5;
      font-weight: bold;
      font-size: 1.2rem;
      line-height: 1;
      transition: 0.2s;
    }
    .remove-chip:hover {
      color: #ff4d4d;
      transform: scale(1.2);
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .small-note {
      color: #aaa;
      margin-top: 10px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎡 Karar Çarkı</h1>
  <div class="wheel-wrapper">
    <div class="pointer">▼</div>
    <canvas id="wheelCanvas" width="400" height="400"></canvas>
  </div>

  <div class="result-area" id="resultDisplay">🤔 Henüz çevirmedin...</div>

  <div class="input-section">
    <input type="text" id="optionInput" placeholder="Seçenek yaz... (örn: Pizza)" maxlength="40">
    <button class="btn" id="addBtn">➕ Ekle</button>
  </div>

  <div class="options-list" id="optionsContainer"></div>

  <div class="controls">
    <button class="btn spin-btn" id="spinBtn">🎲 ÇEVİR</button>
    <button class="btn secondary" id="clearBtn">🗑️ Tümünü Sil</button>
  </div>
  <div class="small-note">✨ En az 2 seçenek ekleyip çarkı çevirebilirsin.</div>
</div>

<script>
  (function() {
    // --- DOM öğeleri ---
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const optionInput = document.getElementById('optionInput');
    const addBtn = document.getElementById('addBtn');
    const spinBtn = document.getElementById('spinBtn');
    const clearBtn = document.getElementById('clearBtn');
    const optionsContainer = document.getElementById('optionsContainer');
    const resultDisplay = document.getElementById('resultDisplay');

    // --- Durum ---
    let options = [];                 // seçenek metinleri
    let currentAngle = 0;           // radyan cinsinden çarkın mevcut dönüş açısı
    let spinning = false;
    let spinVelocity = 0;
    let animationFrame = null;
    const friction = 0.985;         // sürtünme
    const minVelocity = 0.08;
    const radius = canvas.width / 2;
    const centerX = radius;
    const centerY = radius;

    // --- Renk paleti (dilimler için) ---
    const colorPalette = [
      "#FF6B6B", "#4ECDC4", "#FFD93D", "#6C5CE7", "#A8E6CF",
      "#FF8C42", "#45B7D1", "#F9ED69", "#F08A5D", "#B83B5E",
      "#3F72AF", "#FFC93C", "#29C7AC", "#D789D7", "#F57170",
      "#11999E", "#E23E57", "#5D54A4", "#F9A828", "#07689F"
    ];

    // --- Yardımcı fonksiyonlar ---
    function getSliceAngle() {
      return (Math.PI * 2) / options.length;
    }

    // Çarkı çiz
    function drawWheel(angleOffset = currentAngle) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (options.length === 0) {
        // Boş çark
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius - 5, 0, 2 * Math.PI);
        ctx.fillStyle = "#2c2c3a";
        ctx.fill();
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "#aaa";
        ctx.font = "18px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.fillText("Seçenek ekleyin", centerX, centerY);
        return;
      }

      const sliceAngle = getSliceAngle();
      for (let i = 0; i < options.length; i++) {
        const startAngle = i * sliceAngle + angleOffset;
        const endAngle = startAngle + sliceAngle;
        
        // Dilim çizimi
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius - 4, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = colorPalette[i % colorPalette.length];
        ctx.fill();
        ctx.strokeStyle = "#222";
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Metin
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#1a1a1a";
        ctx.font = "bold 15px 'Segoe UI', 'Poppins'";
        ctx.shadowColor = "white";
        ctx.shadowBlur = 4;
        const text = options[i].length > 14 ? options[i].substring(0, 13) + "…" : options[i];
        ctx.fillText(text, radius * 0.65, 6);
        ctx.restore();
      }

      // Orta dekor
      ctx.beginPath();
      ctx.arc(centerX, centerY, 18, 0, 2 * Math.PI);
      ctx.fillStyle = "#1E1E2F";
      ctx.fill();
      ctx.strokeStyle = "#FFD966";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(centerX, centerY, 10, 0, 2 * Math.PI);
      ctx.fillStyle = "#FFD966";
      ctx.fill();
    }

    // Seçenek listesini güncelle (chip'ler)
    function renderOptionsList() {
      optionsContainer.innerHTML = '';
      options.forEach((opt, index) => {
        const chip = document.createElement('div');
        chip.className = 'option-chip';
        chip.innerHTML = `
          <span>${opt}</span>
          <span class="remove-chip" data-index="${index}">✖</span>
        `;
        optionsContainer.appendChild(chip);
      });

      // Silme butonlarına olay ekle
      document.querySelectorAll('.remove-chip').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.getAttribute('data-index'));
          removeOption(idx);
        });
      });
    }

    function removeOption(index) {
      if (spinning) return;
      options.splice(index, 1);
      renderOptionsList();
      drawWheel(currentAngle);
      if (options.length < 2) {
        resultDisplay.textContent = "⚠️ En az 2 seçenek gerekli";
      } else {
        resultDisplay.textContent = "🎯 Çark güncellendi";
      }
    }

    function addOption(optionText) {
      const trimmed = optionText.trim();
      if (trimmed === '') {
        alert("Lütfen geçerli bir seçenek yaz.");
        return;
      }
      if (options.includes(trimmed)) {
        alert("Bu seçenek zaten var.");
        return;
      }
      if (options.length >= 30) {
        alert("En fazla 30 seçenek ekleyebilirsin.");
        return;
      }
      options.push(trimmed);
      renderOptionsList();
      drawWheel(currentAngle);
      optionInput.value = '';
      if (options.length >= 2) {
        resultDisplay.textContent = "✅ Çark hazır!";
      }
    }

    // Çarkı döndürme animasyonu
    function spinAnimation() {
      if (!spinning) return;
      
      spinVelocity *= friction;
      currentAngle = (currentAngle + spinVelocity) % (Math.PI * 2);
      drawWheel(currentAngle);

      if (spinVelocity < minVelocity) {
        // Durdu
        spinning = false;
        cancelAnimationFrame(animationFrame);
        determineResult();
        return;
      }
      
      animationFrame = requestAnimationFrame(spinAnimation);
    }

    function determineResult() {
      if (options.length === 0) {
        resultDisplay.textContent = "🤷‍♂️ Seçenek yok";
        return;
      }
      const sliceAngle = getSliceAngle();
      // İşaretçi yukarıda ( -PI/2 yani 270° veya -90°). Normalize açı.
      // Çark açısı currentAngle, dilimlerin başlangıcı currentAngle'a göre kaymış.
      // İşaretçi yönü: canvas koordinat sisteminde yukarısı -PI/2 radyan.
      const pointerAngle = (Math.PI * 3 / 2) % (Math.PI * 2); // 270 derece
      // Hangi dilimin işaretçiye denk geldiğini bul.
      let rawAngle = (pointerAngle - currentAngle + Math.PI * 2) % (Math.PI * 2);
      let index = Math.floor(rawAngle / sliceAngle) % options.length;
      const selected = options[index];
      resultDisplay.textContent = `✨ Karar: ${selected} ✨`;
      // Görsel vurgu için sonucu console'a da yazdık (isteğe bağlı)
    }

    function startSpin() {
      if (spinning) return;
      if (options.length < 2) {
        alert("Lütfen en az 2 seçenek ekleyin.");
        return;
      }
      // Rastgele başlangıç hızı (0.3 ile 0.9 radyan/frame arası)
      spinVelocity = 0.35 + Math.random() * 0.65;
      spinning = true;
      resultDisplay.textContent = "🎡 Çark dönüyor...";
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = requestAnimationFrame(spinAnimation);
    }

    function clearAllOptions() {
      if (spinning) return;
      options = [];
      renderOptionsList();
      currentAngle = 0;
      drawWheel(0);
      resultDisplay.textContent = "🧹 Tüm seçenekler silindi";
    }

    // --- Olay dinleyicileri ---
    addBtn.addEventListener('click', () => {
      addOption(optionInput.value);
    });

    optionInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addOption(optionInput.value);
      }
    });

    spinBtn.addEventListener('click', startSpin);

    clearBtn.addEventListener('click', clearAllOptions);

    // Canvas tıklamasıyla da çevirme (opsiyonel)
    canvas.addEventListener('click', () => {
      if (!spinning && options.length >= 2) {
        startSpin();
      }
    });

    // Başlangıç render
    drawWheel(0);
    renderOptionsList();
    resultDisplay.textContent = "👋 Seçenek ekleyip başla!";
  })();
</script>
</body>
</html>
