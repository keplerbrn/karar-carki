<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚡ Karar Çarkı</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0e0b1f;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(120, 40, 200, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 200, 200, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(255, 50, 120, 0.2) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
      overflow-x: hidden;
    }

    /* Arka plana hafif hareketli grid efekti */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 650px;
      width: 100%;
      background: rgba(20, 15, 35, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 30px 25px 35px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 40px rgba(180, 50, 255, 0.25), 0 0 10px rgba(0, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-weight: 800;
      font-size: 2.6rem;
      letter-spacing: 2px;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #ff6ec7, #00f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px #ff3a9e);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wheel-wrapper {
      position: relative;
      margin: 10px 0 20px;
      filter: drop-shadow(0 0 25px rgba(200, 50, 255, 0.6));
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 50%;
      background: #1c1635;
      box-shadow: 0 0 50px rgba(150, 0, 255, 0.5), 0 0 0 5px rgba(255,255,255,0.08);
    }

    .pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.8rem;
      filter: drop-shadow(0 0 15px #ffdd44);
      z-index: 10;
      color: #ffe600;
      text-shadow: 0 0 25px #ffb300;
      line-height: 1;
    }

    .result-area {
      background: rgba(10, 5, 25, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 16px 32px;
      margin: 15px 0 20px;
      font-size: 1.7rem;
      font-weight: 700;
      color: #fff3c9;
      border: 1px solid rgba(255, 215, 0, 0.5);
      box-shadow: 0 0 30px rgba(255, 180, 0, 0.4);
      text-align: center;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      text-shadow: 0 0 10px #ffaa00;
    }

    .input-section {
      display: flex;
      gap: 10px;
      width: 100%;
      margin: 10px 0 5px;
    }

    #optionInput {
      flex: 1;
      padding: 15px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    #optionInput::placeholder {
      color: #a9a4c0;
      font-weight: 300;
    }

    #optionInput:focus {
      border-color: #ff6ec7;
      box-shadow: 0 0 20px rgba(255, 100, 200, 0.5);
      background: rgba(255,255,255,0.12);
    }

    .btn {
      font-family: 'Poppins', sans-serif;
      border: none;
      border-radius: 50px;
      padding: 15px 26px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.07);
      color: #e0d9ff;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0 0 20px rgba(200, 100, 255, 0.5);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .spin-btn {
      background: linear-gradient(135deg, #ff416c, #ff4b8c);
      color: white;
      font-size: 1.4rem;
      padding: 18px 40px;
      font-weight: 800;
      border: none;
      box-shadow: 0 10px 30px rgba(255, 65, 108, 0.5), 0 0 30px #ff2e6d;
      text-shadow: 0 2px 10px black;
    }

    .spin-btn:hover {
      background: linear-gradient(135deg, #ff5e84, #ff3477);
      box-shadow: 0 15px 35px rgba(255, 50, 100, 0.7), 0 0 40px #ff3366;
    }

    .secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.25);
    }

    .options-list {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 15px 0 5px;
      justify-content: center;
    }

    .option-chip {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 30px;
      color: #f0e6ff;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      font-size: 0.95rem;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .remove-chip {
      cursor: pointer;
      color: #ff7ea0;
      font-weight: bold;
      font-size: 1.2rem;
      transition: 0.2s;
    }

    .remove-chip:hover {
      color: #ff3c6a;
      transform: scale(1.3);
      text-shadow: 0 0 10px red;
    }

    .controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      margin-top: 10px;
    }

    .small-note {
      color: #9b96b8;
      margin-top: 14px;
      font-size: 0.8rem;
      font-weight: 400;
      text-shadow: 0 0 8px black;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ KARAR ÇARKI ⚡</h1>
  <div class="wheel-wrapper">
    <div class="pointer">▼</div>
    <canvas id="wheelCanvas" width="420" height="420"></canvas>
  </div>

  <div class="result-area" id="resultDisplay">🤘 Çevirmeye hazır!</div>

  <div class="input-section">
    <input type="text" id="optionInput" placeholder="Seçenek ekle... (örn: Parti 🎉)" maxlength="35">
    <button class="btn" id="addBtn">➕</button>
  </div>

  <div class="options-list" id="optionsContainer"></div>

  <div class="controls">
    <button class="btn spin-btn" id="spinBtn">🎰 ÇEVİR</button>
    <button class="btn secondary" id="clearBtn">🗑️ SIFIRLA</button>
  </div>
  <div class="small-note">⚡ 2+ seçenek ekle, çarkı çevir, kararını yakala!</div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const optionInput = document.getElementById('optionInput');
    const addBtn = document.getElementById('addBtn');
    const spinBtn = document.getElementById('spinBtn');
    const clearBtn = document.getElementById('clearBtn');
    const optionsContainer = document.getElementById('optionsContainer');
    const resultDisplay = document.getElementById('resultDisplay');

    let options = [];
    let currentAngle = 0;
    let spinning = false;
    let spinVelocity = 0;
    let animationFrame = null;
    // Dinamik friction: hız yüksekken hızlı yavaşla, düşükken yavaş yavaşla (heyecan)
    const frictionFast = 0.983;
    const frictionSlow = 0.996;
    const lowSpeedThreshold = 0.12; // rad/frame altına düşünce sürtünme azalıyor
    const minVelocity = 0.012;
    const radius = canvas.width / 2;
    const centerX = radius;
    const centerY = radius;

    // Parçacık sistemi (neon)
    let particles = [];
    const maxParticles = 70;

    // Neon dilim renkleri (göz alıcı)
    const neonColors = [
      "#FF4D6D", "#FF6EC7", "#FFB347", "#FFD93D", "#A0E7E5",
      "#00C9B6", "#6C5CE7", "#A855F7", "#F472B6", "#34D399",
      "#F97316", "#FACC15", "#38BDF8", "#818CF8", "#FB7185",
      "#4ADE80", "#F43F5E", "#C084FC", "#FBBF24", "#2DD4BF"
    ];

    function getSliceAngle() {
      return (Math.PI * 2) / options.length;
    }

    // Çark çizimi (neon efektli)
    function drawWheel(angleOffset = currentAngle) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (options.length === 0) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius - 5, 0, 2 * Math.PI);
        ctx.fillStyle = "#1b1638";
        ctx.fill();
        ctx.strokeStyle = "#4a3f7a";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "#8882aa";
        ctx.font = "600 18px 'Poppins'";
        ctx.textAlign = "center";
        ctx.fillText("Seçenek ekle ⚡", centerX, centerY);
        return;
      }

      const sliceAngle = getSliceAngle();
      for (let i = 0; i < options.length; i++) {
        const startAngle = i * sliceAngle + angleOffset;
        const endAngle = startAngle + sliceAngle;
        
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius - 6, startAngle, endAngle);
        ctx.closePath();
        const gradient = ctx.createLinearGradient(centerX - 50, centerY - 50, centerX + 50, centerY + 50);
        gradient.addColorStop(0, neonColors[i % neonColors.length]);
        gradient.addColorStop(1, neonColors[(i + 1) % neonColors.length]);
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2.5;
        ctx.shadowColor = neonColors[i % neonColors.length];
        ctx.shadowBlur = 15;
        ctx.stroke();
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;

        // Metin
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 16px 'Poppins'";
        ctx.shadowColor = "#000";
        ctx.shadowBlur = 8;
        const text = options[i].length > 13 ? options[i].substring(0, 12) + "…" : options[i];
        ctx.fillText(text, radius * 0.67, 6);
        ctx.restore();
      }

      // Merkez dekor (parlayan)
      ctx.beginPath();
      ctx.arc(centerX, centerY, 24, 0, 2 * Math.PI);
      const centerGrad = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 24);
      centerGrad.addColorStop(0, "#ffffff");
      centerGrad.addColorStop(0.5, "#ffe484");
      centerGrad.addColorStop(1, "#b45389");
      ctx.fillStyle = centerGrad;
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(centerX, centerY, 10, 0, 2 * Math.PI);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
    }

    // Parçacık işlemleri
    function spawnParticle() {
      if (particles.length > maxParticles) return;
      const angle = Math.random() * 2 * Math.PI;
      const speed = 1.8 + Math.random() * 3.5;
      const size = 3 + Math.random() * 8;
      const life = 1.0;
      const colors = ["#ff4d6d", "#00f0ff", "#ffb800", "#d946ef", "#34d399", "#facc15", "#ff6ec7"];
      const color = colors[Math.floor(Math.random() * colors.length)];
      particles.push({
        x: centerX,
        y: centerY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: size,
        life: life,
        maxLife: life,
        color: color,
        type: Math.random() < 0.4 ? 'star' : 'circle'
      });
    }

    function updateParticles() {
      for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.life -= 0.015;
        if (p.life <= 0 || p.x < -30 || p.x > canvas.width+30 || p.y < -30 || p.y > canvas.height+30) {
          particles.splice(i,1);
        }
      }
    }

    function drawParticles() {
      for (let p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life * 0.85;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 12;
        if (p.type === 'star') {
          drawStar(ctx, p.x, p.y, 5, p.size, p.size/2.5);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size/2, 0, 2*Math.PI);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
      let rot = Math.PI / 2 * 3;
      const step = Math.PI / spikes;
      ctx.beginPath();
      for (let i = 0; i < spikes; i++) {
        let x = cx + Math.cos(rot) * outerR;
        let y = cy + Math.sin(rot) * outerR;
        ctx.lineTo(x, y);
        rot += step;
        x = cx + Math.cos(rot) * innerR;
        y = cy + Math.sin(rot) * innerR;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.closePath();
      ctx.fill();
    }

    // Dinamik friction ile spin animasyonu
    function spinAnimation() {
      if (!spinning) return;
      
      // Parçacık üret
      if (Math.random() < 0.6) spawnParticle();
      updateParticles();
      
      // Dinamik friction: hıza göre
      let currentFriction = (spinVelocity < lowSpeedThreshold) ? frictionSlow : frictionFast;
      spinVelocity *= currentFriction;
      currentAngle = (currentAngle + spinVelocity) % (Math.PI * 2);
      
      drawWheel(currentAngle);
      drawParticles();

      if (spinVelocity < minVelocity) {
        spinning = false;
        cancelAnimationFrame(animationFrame);
        // Durma anında ekstra parçacık patlaması
        for (let i=0; i<15; i++) spawnParticle();
        let fadeFrames = 0;
        function fadeOutParticles() {
          if (fadeFrames > 40 || particles.length === 0) {
            particles = [];
            drawWheel(currentAngle);
            determineResult();
            return;
          }
          updateParticles();
          drawWheel(currentAngle);
          drawParticles();
          fadeFrames++;
          requestAnimationFrame(fadeOutParticles);
        }
        fadeOutParticles();
        return;
      }
      
      animationFrame = requestAnimationFrame(spinAnimation);
    }

    function determineResult() {
      if (options.length === 0) {
        resultDisplay.textContent = "🤷 Seçenek yok";
        return;
      }
      const sliceAngle = getSliceAngle();
      const pointerAngle = (Math.PI * 3 / 2) % (Math.PI * 2);
      let rawAngle = (pointerAngle - currentAngle + Math.PI * 2) % (Math.PI * 2);
      let index = Math.floor(rawAngle / sliceAngle) % options.length;
      resultDisplay.textContent = `🎉 ${options[index]} 🎉`;
    }

    function startSpin() {
      if (spinning) return;
      if (options.length < 2) {
        alert("⚡ En az 2 seçenek gerekli!");
        return;
      }
      // Yüksek başlangıç hızı: 0.7 - 1.2 rad/frame
      spinVelocity = 0.75 + Math.random() * 0.55;
      spinning = true;
      resultDisplay.textContent = "🌀 Dönüyor...";
      for (let i=0; i<12; i++) spawnParticle();
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = requestAnimationFrame(spinAnimation);
    }

    // Seçenek yönetimi
    function renderOptionsList() {
      optionsContainer.innerHTML = '';
      options.forEach((opt, index) => {
        const chip = document.createElement('div');
        chip.className = 'option-chip';
        chip.innerHTML = `<span>${opt}</span><span class="remove-chip" data-index="${index}">✕</span>`;
        optionsContainer.appendChild(chip);
      });
      document.querySelectorAll('.remove-chip').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.getAttribute('data-index'));
          removeOption(idx);
        });
      });
    }

    function removeOption(index) {
      if (spinning) return;
      options.splice(index, 1);
      renderOptionsList();
      drawWheel(currentAngle);
      resultDisplay.textContent = options.length < 2 ? "⚠️ En az 2 seçenek gerekli" : "⚡ Çark güncellendi";
    }

    function addOption(optText) {
      const trimmed = optText.trim();
      if (trimmed === '') { alert("Bir şey yaz!"); return; }
      if (options.includes(trimmed)) { alert("Bu zaten var!"); return; }
      if (options.length >= 30) { alert("Maksimum 30 seçenek!"); return; }
      options.push(trimmed);
      renderOptionsList();
      drawWheel(currentAngle);
      optionInput.value = '';
      if (options.length >= 2) resultDisplay.textContent = "🔥 Hazır!";
    }

    function clearAllOptions() {
      if (spinning) return;
      options = [];
      renderOptionsList();
      currentAngle = 0;
      drawWheel(0);
      resultDisplay.textContent = "🧹 Temizlendi";
    }

    // Event listeners
    addBtn.addEventListener('click', () => addOption(optionInput.value));
    optionInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addOption(optionInput.value); });
    spinBtn.addEventListener('click', startSpin);
    clearBtn.addEventListener('click', clearAllOptions);
    canvas.addEventListener('click', () => { if (!spinning && options.length >= 2) startSpin(); });

    // Başlangıç
    drawWheel(0);
    renderOptionsList();
    resultDisplay.textContent = "🤘 Seçenekleri ekle, çevir!";
  })();
</script>
</body>
</html>
