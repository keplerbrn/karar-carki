<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🎪 Çarkıfelek</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Quicksand', sans-serif;
      background: #2d1b2e;
      background-image: repeating-linear-gradient(45deg, #d43f3f 0px, #d43f3f 40px, #f5e9d8 40px, #f5e9d8 80px);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
      position: relative;
    }
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,200,0.25) 0%, transparent 30%),
                  radial-gradient(circle at 80% 70%, rgba(255,200,100,0.3) 0%, transparent 40%),
                  radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 50%);
      pointer-events: none;
    }
    .container {
      position: relative; z-index: 1;
      max-width: 660px; width: 100%;
      background: rgba(255, 248, 235, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 64px;
      padding: 25px 25px 35px;
      border: 4px solid #f7b32b;
      box-shadow: 0 30px 45px rgba(0,0,0,0.5), 0 0 0 8px #b33c2f, 0 0 30px #ffb703;
      display: flex; flex-direction: column; align-items: center;
    }
    .slogan {
      font-family: 'Fredoka One', cursive; font-size: 1.4rem;
      color: #b23b2c; background: #ffe9b6;
      padding: 10px 32px; border-radius: 50px;
      margin-bottom: 12px; letter-spacing: 1.5px;
      border: 3px dashed #f59e1b; box-shadow: 0 6px 0 #d4782f;
      text-shadow: 1px 1px 0 white;
    }
    h1 {
      font-family: 'Fredoka One', cursive; font-weight: 400;
      font-size: 3rem; letter-spacing: 3px;
      margin: 10px 0 20px; color: #4a2512;
      text-shadow: 3px 3px 0 #ffb703, 5px 5px 0 rgba(0,0,0,0.2);
      display: flex; align-items: center; gap: 12px;
    }
    .wheel-wrapper {
      position: relative; margin: 10px 0 20px;
      filter: drop-shadow(0 20px 25px rgba(0,0,0,0.4));
    }
    canvas {
      display: block; margin: 0 auto; border-radius: 50%;
      background: #fdebd0;
      box-shadow: 0 0 0 12px #fff0d0, 0 0 0 18px #d49b3b;
    }
    .pointer {
      position: absolute; top: -30px; left: 50%;
      transform: translateX(-50%);
      font-size: 3.2rem;
      filter: drop-shadow(0 10px 8px rgba(0,0,0,0.5));
      z-index: 20; color: #e63946;
      text-shadow: 0 0 12px gold; line-height: 1;
      transition: transform 0.05s ease; cursor: default;
    }
    .pointer.tick {
      transform: translateX(-50%) translateY(8px);
    }
    .result-area {
      background: #ffe0a8; border-radius: 60px;
      padding: 14px 30px; margin: 15px 0 20px;
      font-size: 1.8rem; font-weight: 700;
      font-family: 'Fredoka One', cursive; color: #3d1e0e;
      border: 3px solid #c47f3a;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.1), 0 8px 0 #a35426;
      text-align: center; min-height: 70px;
      display: flex; align-items: center; justify-content: center;
      width: 100%;
    }
    .input-section {
      display: flex; gap: 10px; width: 100%; margin: 10px 0 5px;
    }
    #optionInput {
      flex: 1; padding: 15px 20px; border-radius: 50px;
      border: 3px solid #e5a145; background: #fff7eb;
      color: #3e2f24; font-size: 1rem;
      font-family: 'Quicksand', sans-serif; font-weight: 700;
      outline: none; box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
      transition: 0.2s;
    }
    #optionInput:focus {
      border-color: #d35400;
      box-shadow: 0 0 0 4px rgba(211, 84, 0, 0.3);
    }
    .btn {
      font-family: 'Fredoka One', cursive; border: none;
      border-radius: 50px; padding: 14px 26px;
      font-weight: 400; font-size: 1.1rem; cursor: pointer;
      transition: all 0.15s ease; display: flex; align-items: center; gap: 6px;
      background: #fde4b3; color: #5a310d;
      border: 3px solid #d28d3b; box-shadow: 0 5px 0 #b85c1a;
      letter-spacing: 0.8px; text-transform: uppercase;
    }
    .btn:active {
      transform: translateY(3px); box-shadow: 0 2px 0 #b85c1a;
    }
    .spin-btn {
      background: #f7b731; color: #442105; font-size: 1.7rem;
      padding: 18px 42px; border-color: #c17d1a;
      box-shadow: 0 8px 0 #9e5a14, 0 10px 20px rgba(0,0,0,0.3);
      text-shadow: 1px 1px 0 white;
    }
    .spin-btn:active {
      transform: translateY(5px); box-shadow: 0 3px 0 #9e5a14, 0 8px 15px rgba(0,0,0,0.3);
    }
    .secondary {
      background: #fce6cf; border-color: #cf9f6f;
    }
    .options-list {
      width: 100%; display: flex; flex-wrap: wrap; gap: 8px;
      margin: 15px 0 5px; justify-content: center;
    }
    .option-chip {
      background: #fdf2df; padding: 8px 20px; border-radius: 30px;
      color: #4a2c1a; display: flex; align-items: center; gap: 10px;
      border: 2px solid #ebaa6e; font-size: 1rem; font-weight: 700;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }
    .remove-chip {
      cursor: pointer; color: #c0392b; font-weight: bold; font-size: 1.3rem; transition: 0.2s;
    }
    .remove-chip:hover { color: #a01812; transform: scale(1.3); }
    .controls {
      display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
      width: 100%; margin-top: 10px;
    }
    .small-note {
      color: #6b4e32; margin-top: 12px; font-size: 0.95rem;
      font-weight: 700; font-family: 'Quicksand', sans-serif;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="slogan">🎪 Kararsız mısın? Çevir! 🎪</div>
  <h1>🎡 Çarkıfelek</h1>
  <div class="wheel-wrapper">
    <div class="pointer" id="pointer">▼</div>
    <canvas id="wheelCanvas" width="450" height="450"></canvas>
  </div>
  <div class="result-area" id="resultDisplay">✨ Hazır mısın?</div>
  <div class="input-section">
    <input type="text" id="optionInput" placeholder="Seçenek ekle... (örn: Pamuk Şeker 🍭)" maxlength="35">
    <button class="btn" id="addBtn">➕ Ekle</button>
  </div>
  <div class="options-list" id="optionsContainer"></div>
  <div class="controls">
    <button class="btn spin-btn" id="spinBtn">🎡 ÇEVİR</button>
    <button class="btn secondary" id="clearBtn">🗑️ Sıfırla</button>
  </div>
  <div class="small-note">⚡ Dilimler tık tık ilerler, ibre seker, karar belli olur!</div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const pointer = document.getElementById('pointer');
    const optionInput = document.getElementById('optionInput');
    const addBtn = document.getElementById('addBtn');
    const spinBtn = document.getElementById('spinBtn');
    const clearBtn = document.getElementById('clearBtn');
    const optionsContainer = document.getElementById('optionsContainer');
    const resultDisplay = document.getElementById('resultDisplay');

    let options = [];
    let currentAngle = 0;
    let spinning = false;
    let spinVelocity = 0;
    let animationFrame = null;

    // Süre uzatma için optimize edilmiş parametreler
    const friction = 0.995;          // az sürtünme → uzun dönüş
    const lowSpeed = 0.03;          // fren daha geç başlar
    const brakeDuration = 2.8;      // son yavaşlama süresi (saniye)
    let brakeStartAngle = 0;
    let brakeStartVelocity = 0;
    let brakeStartTime = 0;
    let braking = false;

    let lastSliceIndex = -1;
    let sliceAngle = 0;
    const radius = canvas.width / 2;
    const centerX = radius;
    const centerY = radius;

    let particles = [];
    const maxParticles = 60;

    const sliceColors = [
      "#E63946", "#F4A261", "#E9C46A", "#2A9D8F", "#F77F00",
      "#D62828", "#FCA311", "#FFBE0B", "#FB5607", "#8338EC",
      "#3A86FF", "#FF006E", "#F72585", "#7209B7", "#06D6A0",
      "#EF476F", "#FFD166", "#118AB2", "#073B4C", "#A23B72"
    ];

    function updateSliceAngle() {
      sliceAngle = options.length > 0 ? (Math.PI * 2) / options.length : 0;
    }
    updateSliceAngle();

    function triggerTick() {
      pointer.classList.add('tick');
      setTimeout(() => pointer.classList.remove('tick'), 60);
    }

    function drawTeeth(angleOffset) {
      if (options.length === 0) return;
      const toothCount = options.length * 4;
      const outerR = radius - 2;
      const innerR = radius - 14;
      const toothAngle = (Math.PI * 2) / toothCount;
      ctx.save();
      ctx.beginPath();
      for (let i = 0; i < toothCount; i++) {
        const start = i * toothAngle + angleOffset;
        const end = start + toothAngle * 0.6;
        ctx.moveTo(centerX + Math.cos(start) * innerR, centerY + Math.sin(start) * innerR);
        ctx.lineTo(centerX + Math.cos(start) * outerR, centerY + Math.sin(start) * outerR);
        ctx.lineTo(centerX + Math.cos(end) * outerR, centerY + Math.sin(end) * outerR);
        ctx.lineTo(centerX + Math.cos(end) * innerR, centerY + Math.sin(end) * innerR);
      }
      ctx.closePath();
      ctx.fillStyle = "#f7e3af";
      ctx.fill();
      ctx.strokeStyle = "#b2823e";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

    function drawWheel(angleOffset = currentAngle) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.shadowColor = "#00000040";
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius - 10, 0, 2 * Math.PI);
      ctx.fillStyle = "#ecd5b0";
      ctx.fill();
      ctx.restore();

      if (options.length === 0) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius - 16, 0, 2 * Math.PI);
        ctx.fillStyle = "#fdebd0";
        ctx.fill();
        ctx.strokeStyle = "#c49a6c";
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.fillStyle = "#8b5a2b";
        ctx.font = "700 20px 'Fredoka One'";
        ctx.textAlign = "center";
        ctx.fillText("Seçenek ekle 🎪", centerX, centerY);
        drawTeeth(angleOffset);
        return;
      }

      for (let i = 0; i < options.length; i++) {
        const startAngle = i * sliceAngle + angleOffset;
        const endAngle = startAngle + sliceAngle;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius - 16, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = sliceColors[i % sliceColors.length];
        ctx.fill();
        ctx.strokeStyle = "#fff6e5";
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius - 16, startAngle, endAngle);
        ctx.lineTo(centerX, centerY);
        ctx.strokeStyle = "#f1c40f";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#2d1306";
        ctx.font = "700 17px 'Fredoka One'";
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 8;
        const text = options[i].length > 12 ? options[i].substring(0, 11) + "…" : options[i];
        ctx.fillText(text, radius * 0.62, 8);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(centerX, centerY, 28, 0, 2 * Math.PI);
      ctx.fillStyle = "#f7d44a";
      ctx.fill();
      ctx.strokeStyle = "#b35900";
      ctx.lineWidth = 5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(centerX, centerY, 18, 0, 2 * Math.PI);
      ctx.fillStyle = "#ffea9f";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(centerX, centerY, 10, 0, 2 * Math.PI);
      ctx.fillStyle = "#c0392b";
      ctx.fill();
      drawTeeth(angleOffset);
    }

    function spawnParticle() {
      if (particles.length > maxParticles) return;
      const angle = Math.random() * 2 * Math.PI;
      const speed = 1.8 + Math.random() * 3.5;
      const size = 4 + Math.random() * 8;
      const colors = ["#f1c40f", "#e74c3c", "#3498db", "#2ecc71", "#f39c12", "#9b59b6", "#e67e22", "#1abc9c"];
      particles.push({
        x: centerX, y: centerY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size, life: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        type: Math.random() < 0.4 ? 'star' : 'circle'
      });
    }

    function updateParticles() {
      for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.99; p.vy *= 0.99;
        p.life -= 0.015;
        if (p.life <= 0 || p.x < -40 || p.x > canvas.width+40 || p.y < -40 || p.y > canvas.height+40) {
          particles.splice(i,1);
        }
      }
    }

    function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
      let rot = Math.PI / 2 * 3;
      const step = Math.PI / spikes;
      ctx.beginPath();
      for (let i = 0; i < spikes; i++) {
        let x = cx + Math.cos(rot) * outerR;
        let y = cy + Math.sin(rot) * outerR;
        ctx.lineTo(x, y);
        rot += step;
        x = cx + Math.cos(rot) * innerR;
        y = cy + Math.sin(rot) * innerR;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.closePath();
      ctx.fill();
    }

    function drawParticles() {
      for (let p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life * 0.85;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        if (p.type === 'star') {
          drawStar(ctx, p.x, p.y, 5, p.size, p.size/2.5);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size/2, 0, 2*Math.PI);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function checkSliceChange() {
      if (options.length === 0 || sliceAngle === 0) return;
      let raw = currentAngle % (Math.PI * 2);
      if (raw < 0) raw += Math.PI * 2;
      const idx = Math.floor(raw / sliceAngle);
      if (idx !== lastSliceIndex) {
        lastSliceIndex = idx;
        triggerTick();
      }
    }

    function brakeStep(now) {
      if (!braking) return;
      const elapsed = (now - brakeStartTime) / 1000;
      if (elapsed >= brakeDuration) {
        currentAngle = brakeStartAngle;
        spinVelocity = 0;
        braking = false;
        spinning = false;
        for (let i=0; i<15; i++) spawnParticle();
        let fadeOut = 0;
        function fade() {
          if (fadeOut > 35 || particles.length === 0) {
            particles = [];
            drawWheel(currentAngle);
            determineResult();
            return;
          }
          updateParticles();
          drawWheel(currentAngle);
          drawParticles();
          fadeOut++;
          requestAnimationFrame(fade);
        }
        fade();
        return;
      }
      const v0 = brakeStartVelocity;
      const a = v0 / brakeDuration;
      currentAngle = (brakeStartAngle + v0 * elapsed - 0.5 * a * elapsed * elapsed) % (Math.PI * 2);
      spinVelocity = v0 - a * elapsed;
      if (Math.random() < 0.3) spawnParticle();
      updateParticles();
      drawWheel(currentAngle);
      drawParticles();
      checkSliceChange();
      animationFrame = requestAnimationFrame(brakeStep);
    }

    function spinAnimation() {
      if (!spinning || braking) return;
      if (spinVelocity < lowSpeed) {
        braking = true;
        brakeStartAngle = currentAngle;
        brakeStartVelocity = spinVelocity;
        brakeStartTime = performance.now();
        cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(brakeStep);
        return;
      }
      spinVelocity *= friction;
      currentAngle = (currentAngle + spinVelocity) % (Math.PI * 2);
      if (Math.random() < 0.35) spawnParticle();
      updateParticles();
      drawWheel(currentAngle);
      drawParticles();
      checkSliceChange();
      animationFrame = requestAnimationFrame(spinAnimation);
    }

    function determineResult() {
      if (options.length === 0) return;
      const raw = ((Math.PI * 3 / 2) - currentAngle + Math.PI * 2) % (Math.PI * 2);
      const idx = Math.floor(raw / sliceAngle) % options.length;
      resultDisplay.textContent = `🎉 ${options[idx]} 🎉`;
    }

    function startSpin() {
      if (spinning) return;
      if (options.length < 2) { alert("En az 2 seçenek eklemelisin!"); return; }
      updateSliceAngle();
      lastSliceIndex = -1;
      spinVelocity = 0.22 + Math.random() * 0.13;
      spinning = true;
      braking = false;
      resultDisplay.textContent = "🎡 Dönüyor...";
      for (let i=0; i<10; i++) spawnParticle();
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = requestAnimationFrame(spinAnimation);
    }

    function renderOptionsList() {
      optionsContainer.innerHTML = '';
      options.forEach((opt, index) => {
        const chip = document.createElement('div');
        chip.className = 'option-chip';
        chip.innerHTML = `<span>${opt}</span><span class="remove-chip" data-index="${index}">✕</span>`;
        optionsContainer.appendChild(chip);
      });
      document.querySelectorAll('.remove-chip').forEach(btn => {
        btn.addEventListener('click', (e) => {
          removeOption(parseInt(e.target.getAttribute('data-index')));
        });
      });
    }

    function removeOption(index) {
      if (spinning) return;
      options.splice(index, 1);
      updateSliceAngle();
      renderOptionsList();
      drawWheel(currentAngle);
      resultDisplay.textContent = options.length < 2 ? "⚠️ En az 2 seçenek gerek" : "👍 Güncellendi";
    }

    function addOption(text) {
      const trimmed = text.trim();
      if (trimmed === '') { alert("Bir seçenek yaz!"); return; }
      if (options.includes(trimmed)) { alert("Zaten eklenmiş!"); return; }
      if (options.length >= 30) { alert("En fazla 30 seçenek!"); return; }
      options.push(trimmed);
      updateSliceAngle();
      renderOptionsList();
      drawWheel(currentAngle);
      optionInput.value = '';
      if (options.length >= 2) resultDisplay.textContent = "✅ Hazır!";
    }

    function clearAll() {
      if (spinning) return;
      options = [];
      updateSliceAngle();
      renderOptionsList();
      currentAngle = 0;
      drawWheel(0);
      resultDisplay.textContent = "🧹 Temizlendi";
    }

    addBtn.addEventListener('click', () => addOption(optionInput.value));
    optionInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addOption(optionInput.value); });
    spinBtn.addEventListener('click', startSpin);
    clearBtn.addEventListener('click', clearAll);
    canvas.addEventListener('click', () => { if (!spinning && options.length >= 2) startSpin(); });

    drawWheel(0);
    renderOptionsList();
    resultDisplay.textContent = "🎪 Hoş geldin!";
  })();
</script>
</body>
</html>
