<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Karnaval Çarkı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold: #f4c542;
    --gold-dark: #b8860b;
    --stripe-red: #c62828;
    --stripe-red-2: #e53935;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;overflow:hidden;
    font-family:'Quicksand',sans-serif;
  }
  body{
    display:flex;align-items:center;justify-content:center;
    background:
      repeating-linear-gradient(
        135deg,
        var(--stripe-red) 0 28px,
        var(--stripe-red-2) 28px 56px,
        #fff5e6 56px 84px,
        #fff 84px 112px
      );
    background-size: 158px 158px;
    animation: driftStripes 40s linear infinite;
    position:relative;
  }
  @keyframes driftStripes{
    0%{background-position:0 0;}
    100%{background-position:1000px 1000px;}
  }
  body::before{
    content:"";
    position:absolute;inset:0;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.35) 100%);
    pointer-events:none;
  }

  #confetti-canvas{
    position:fixed;inset:0;width:100vw;height:100vh;
    pointer-events:none;z-index:50;
  }

  .app{
    position:relative;
    z-index:2;
    width:340px;
    max-height:96vh;
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:2px solid rgba(244,197,66,0.65);
    border-radius:26px;
    box-shadow:0 8px 32px rgba(0,0,0,0.35), inset 0 0 24px rgba(255,255,255,0.08);
    padding:14px 16px 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }

  h1{
    font-family:'Fredoka One',cursive;
    color:#fff;
    font-size:15px;
    letter-spacing:0.5px;
    margin:2px 0 0;
    text-shadow:0 2px 6px rgba(0,0,0,0.45), 0 0 14px rgba(244,197,66,0.5);
    text-align:center;
  }

  .wheel-wrap{
    position:relative;
    width:200px;
    height:200px;
    flex-shrink:0;
    margin:2px 0 4px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #pointer{
    position:absolute;
    top:-2px;
    left:50%;
    transform-origin:50% 0%;
    transform:translateX(-50%) rotate(0deg);
    width:0;height:0;
    border-left:11px solid transparent;
    border-right:11px solid transparent;
    border-top:20px solid var(--gold);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    z-index:6;
    transition:none;
  }
  #pointer.tick{
    animation:tickBounce 0.09s ease-out;
  }
  @keyframes tickBounce{
    0%{transform:translateX(-50%) rotate(0deg) scale(1);}
    45%{transform:translateX(-50%) rotate(-8deg) translateY(3px) scale(0.94);}
    100%{transform:translateX(-50%) rotate(0deg) scale(1);}
  }

  #wheelCanvas{
    border-radius:50%;
    cursor:pointer;
    box-shadow:0 0 0 4px var(--gold-dark), 0 0 0 7px var(--gold), 0 6px 22px rgba(0,0,0,0.5);
    background:#222;
    touch-action:manipulation;
  }

  .center-ornament{
    position:absolute;
    width:26px;height:26px;
    border-radius:50%;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    background:
      radial-gradient(circle at 35% 30%, #fff8dd 0%, var(--gold) 35%, var(--gold-dark) 70%, #7a5a00 100%);
    box-shadow:0 0 0 2px #7a5a00, 0 0 10px rgba(244,197,66,0.9), 0 2px 4px rgba(0,0,0,0.5);
    z-index:5;
    pointer-events:none;
  }
  .center-ornament::after{
    content:"";
    position:absolute;
    inset:8px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #fff, var(--gold) 60%);
    box-shadow:inset 0 0 3px rgba(0,0,0,0.4);
  }

  .slogan{
    font-family:'Fredoka One',cursive;
    color:var(--gold);
    font-size:13px;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
    margin:0 0 2px;
    text-align:center;
  }

  #result{
    min-height:22px;
    font-family:'Fredoka One',cursive;
    font-size:16px;
    color:#fff;
    text-align:center;
    text-shadow:0 0 8px rgba(244,197,66,0.0);
    transform:scale(1);
    transition:transform 0.25s ease, text-shadow 0.25s ease, color 0.25s ease;
  }
  #result.pop{
    color:var(--gold);
    transform:scale(1.28);
    text-shadow:0 0 18px rgba(244,197,66,0.95), 0 0 34px rgba(244,197,66,0.6);
  }

  .controls-row{
    display:flex;
    gap:6px;
    width:100%;
  }
  #optionInput{
    flex:1;
    min-width:0;
    padding:8px 10px;
    border-radius:12px;
    border:2px solid rgba(244,197,66,0.5);
    background:rgba(255,255,255,0.85);
    font-family:'Quicksand',sans-serif;
    font-weight:600;
    font-size:13px;
    outline:none;
    color:#333;
  }
  #optionInput:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 2px rgba(244,197,66,0.4);
  }

  button{
    font-family:'Fredoka One',cursive;
    border:none;
    cursor:pointer;
    border-radius:12px;
    letter-spacing:0.4px;
    transition:transform 0.12s ease, filter 0.12s ease;
  }
  button:active{transform:scale(0.94);}
  button:disabled{opacity:0.45;cursor:not-allowed;}

  #addBtn{
    background:linear-gradient(180deg,#4ecdc4,#2fa79c);
    color:#fff;
    padding:0 14px;
    font-size:18px;
    box-shadow:0 3px 0 #1e756c;
  }

  .options-list{
    width:100%;
    max-height:78px;
    overflow-y:auto;
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    padding:2px 1px;
  }
  .options-list::-webkit-scrollbar{width:6px;}
  .options-list::-webkit-scrollbar-thumb{background:rgba(244,197,66,0.6);border-radius:4px;}

  .chip{
    display:flex;
    align-items:center;
    gap:5px;
    background:rgba(255,255,255,0.85);
    border-radius:999px;
    padding:4px 6px 4px 10px;
    font-size:11.5px;
    font-weight:600;
    color:#333;
    max-width:150px;
  }
  .chip span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:110px;
  }
  .chip .del{
    background:#e53935;
    color:#fff;
    width:16px;height:16px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;
    line-height:1;
    cursor:pointer;
    flex-shrink:0;
    font-family:'Quicksand',sans-serif;
    font-weight:700;
  }

  .bottom-row{
    display:flex;
    gap:8px;
    width:100%;
    margin-top:2px;
  }
  #spinBtn{
    flex:2;
    padding:10px 0;
    font-size:15px;
    background:linear-gradient(180deg,#ffd93d,#f4a300);
    color:#5c3d00;
    box-shadow:0 4px 0 #a86e00;
  }
  #spinBtn:hover:not(:disabled){filter:brightness(1.06);}
  #resetBtn{
    flex:1;
    padding:10px 0;
    font-size:12px;
    background:linear-gradient(180deg,#ff6b6b,#e53935);
    color:#fff;
    box-shadow:0 4px 0 #a41f1f;
  }

  .count{
    font-size:10.5px;
    color:rgba(255,255,255,0.8);
    align-self:flex-end;
    margin:-4px 2px 0 0;
    font-weight:600;
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="app">
  <h1>🎪 Karnaval Çarkı</h1>

  <div class="wheel-wrap">
    <div id="pointer"></div>
    <canvas id="wheelCanvas" width="400" height="400" style="width:200px;height:200px;"></canvas>
    <div class="center-ornament"></div>
  </div>

  <p class="slogan">Kararsız mısın? Çevir!</p>
  <div id="result"></div>

  <div class="controls-row">
    <input id="optionInput" type="text" placeholder="Seçenek ekle..." maxlength="40">
    <button id="addBtn" title="Ekle">+</button>
  </div>
  <div class="count" id="countLabel">0 / 30</div>

  <div class="options-list" id="optionsList"></div>

  <div class="bottom-row">
    <button id="spinBtn">ÇEVİR</button>
    <button id="resetBtn">Sıfırla</button>
  </div>
</div>

<script>
(function(){
  const MAX_OPTIONS = 30;
  const PALETTE = ['#FF3CAC','#784BA0','#2B86C5','#FF6B6B','#4ECDC4','#FFD93D',
                    '#6BCB77','#FF9F1C','#C77DFF','#00F5D4','#F72585','#7209B7',
                    '#3A86FF','#FFBE0B','#FB5607','#8338EC','#06FFA5','#FF006E',
                    '#FFAFCC','#A0C4FF'];

  let options = [];

  const optionInput = document.getElementById('optionInput');
  const addBtn = document.getElementById('addBtn');
  const optionsList = document.getElementById('optionsList');
  const countLabel = document.getElementById('countLabel');
  const spinBtn = document.getElementById('spinBtn');
  const resetBtn = document.getElementById('resetBtn');
  const resultEl = document.getElementById('result');
  const pointerEl = document.getElementById('pointer');

  const wheelCanvas = document.getElementById('wheelCanvas');
  const wctx = wheelCanvas.getContext('2d');
  const W = wheelCanvas.width, H = wheelCanvas.height;
  const CX = W/2, CY = H/2;
  const RADIUS = W/2 - 14;

  // ---------- Confetti ----------
  const confettiCanvas = document.getElementById('confetti-canvas');
  const cctx = confettiCanvas.getContext('2d');
  function resizeConfetti(){
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }
  resizeConfetti();
  window.addEventListener('resize', resizeConfetti);

  let particles = [];
  function spawnConfetti(count, originX, originY, burst){
    for(let i=0;i<count;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = burst ? (2+Math.random()*6) : (1+Math.random()*2.5);
      particles.push({
        x: originX, y: originY,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - (burst?2:0.5),
        rot: Math.random()*Math.PI*2,
        vrot: (Math.random()-0.5)*0.3,
        size: 4+Math.random()*5,
        color: PALETTE[Math.floor(Math.random()*PALETTE.length)],
        shape: Math.random()<0.5 ? 'star':'circle',
        life: 0,
        maxLife: 70+Math.random()*50
      });
    }
  }

  function drawStar(ctx,x,y,r,rot){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(rot);
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a1 = (i*4*Math.PI)/5 - Math.PI/2;
      const px = Math.cos(a1)*r, py = Math.sin(a1)*r;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function updateConfetti(){
    cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    particles = particles.filter(p=>p.life < p.maxLife);
    for(const p of particles){
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.06;
      p.rot += p.vrot;
      p.life++;
      const alpha = Math.max(0, 1 - p.life/p.maxLife);
      cctx.globalAlpha = alpha;
      cctx.fillStyle = p.color;
      if(p.shape === 'star'){
        drawStar(cctx, p.x, p.y, p.size, p.rot);
      } else {
        cctx.beginPath();
        cctx.arc(p.x,p.y,p.size*0.6,0,Math.PI*2);
        cctx.fill();
      }
    }
    cctx.globalAlpha = 1;
    requestAnimationFrame(updateConfetti);
  }
  updateConfetti();

  // ---------- Options management ----------
  function renderOptions(){
    optionsList.innerHTML = '';
    options.forEach((opt, idx)=>{
      const chip = document.createElement('div');
      chip.className = 'chip';
      const span = document.createElement('span');
      span.textContent = opt;
      const del = document.createElement('div');
      del.className = 'del';
      del.textContent = '✕';
      del.addEventListener('click', ()=>{
        options.splice(idx,1);
        renderOptions();
        drawWheel(currentRotation);
      });
      chip.appendChild(span);
      chip.appendChild(del);
      optionsList.appendChild(chip);
    });
    countLabel.textContent = options.length + ' / ' + MAX_OPTIONS;
    spinBtn.disabled = options.length < 2 || spinning;
    addBtn.disabled = options.length >= MAX_OPTIONS;
  }

  function addOption(){
    const val = optionInput.value.trim();
    if(!val) return;
    if(options.length >= MAX_OPTIONS) return;
    const exists = options.some(o=>o.toLowerCase() === val.toLowerCase());
    if(exists){
      optionInput.style.borderColor = '#e53935';
      setTimeout(()=>{ optionInput.style.borderColor=''; }, 500);
      return;
    }
    options.push(val);
    optionInput.value = '';
    renderOptions();
    drawWheel(currentRotation);
  }

  addBtn.addEventListener('click', addOption);
  optionInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ addOption(); }
  });

  resetBtn.addEventListener('click', ()=>{
    if(spinning) return;
    options = [];
    resultEl.textContent = '';
    resultEl.classList.remove('pop');
    renderOptions();
    drawWheel(0);
    currentRotation = 0;
  });

  // ---------- Wheel drawing ----------
  let currentRotation = 0;

  function drawTeeth(rotation){
    const teethCount = 36;
    const outerR = RADIUS + 10;
    const innerR = RADIUS + 2;
    wctx.save();
    wctx.translate(CX,CY);
    wctx.rotate(rotation);
    for(let i=0;i<teethCount;i++){
      const a = (i/teethCount)*Math.PI*2;
      const a2 = a + (Math.PI*2/teethCount)/2;
      wctx.beginPath();
      wctx.moveTo(Math.cos(a)*innerR, Math.sin(a)*innerR);
      wctx.lineTo(Math.cos(a2)*outerR, Math.sin(a2)*outerR);
      wctx.lineTo(Math.cos(a+Math.PI*2/teethCount)*innerR, Math.sin(a+Math.PI*2/teethCount)*innerR);
      wctx.closePath();
      wctx.fillStyle = '#f4c542';
      wctx.fill();
    }
    wctx.restore();
  }

  function drawWheel(rotation){
    wctx.clearRect(0,0,W,H);

    if(options.length === 0){
      drawTeeth(rotation);
      wctx.save();
      wctx.beginPath();
      wctx.arc(CX,CY,RADIUS,0,Math.PI*2);
      wctx.fillStyle = '#3a3a3a';
      wctx.fill();
      wctx.restore();
      wctx.fillStyle = '#f4c542';
      wctx.font = "600 15px 'Quicksand', sans-serif";
      wctx.textAlign = 'center';
      wctx.textBaseline = 'middle';
      wctx.fillText('Seçenek', CX, CY-8);
      wctx.fillText('ekle', CX, CY+10);
      return;
    }

    drawTeeth(rotation);

    const seg = (Math.PI*2) / options.length;
    wctx.save();
    wctx.translate(CX,CY);
    wctx.rotate(rotation);

    for(let i=0;i<options.length;i++){
      const start = -Math.PI/2 + i*seg;
      const end = start + seg;
      wctx.beginPath();
      wctx.moveTo(0,0);
      wctx.arc(0,0,RADIUS,start,end);
      wctx.closePath();
      wctx.fillStyle = PALETTE[i % PALETTE.length];
      wctx.fill();
      wctx.lineWidth = 2;
      wctx.strokeStyle = 'rgba(255,255,255,0.35)';
      wctx.stroke();

      // label
      wctx.save();
      wctx.rotate(start + seg/2);
      wctx.textAlign = 'right';
      wctx.textBaseline = 'middle';
      wctx.fillStyle = '#fff';
      wctx.font = "600 13px 'Quicksand', sans-serif";
      wctx.shadowColor = 'rgba(0,0,0,0.55)';
      wctx.shadowBlur = 3;
      let label = options[i];
      const maxChars = 16;
      if(label.length > maxChars) label = label.slice(0,maxChars-1) + '…';
      wctx.fillText(label, RADIUS - 10, 0);
      wctx.restore();
    }
    wctx.restore();
  }

  drawWheel(0);

  // ---------- Spin physics ----------
  let spinning = false;
  let velocity = 0;
  let phase = 'idle'; // 'accel-free' -> 'brake'
  let brakeStartVelocity = 0;
  let brakeElapsed = 0;
  const BRAKE_DURATION = 3000; // ms
  const FRICTION = 0.992;
  const BRAKE_THRESHOLD = 0.02;
  let lastTickSeg = -1;
  let lastFrameTime = null;

  function triggerTick(){
    pointerEl.classList.remove('tick');
    void pointerEl.offsetWidth;
    pointerEl.classList.add('tick');
  }

  function pickResultIndex(){
    const seg = (Math.PI*2) / options.length;
    let norm = (-currentRotation) % (Math.PI*2);
    if(norm < 0) norm += Math.PI*2;
    let idx = Math.floor(norm / seg) % options.length;
    return idx;
  }

  function spinLoop(timestamp){
    if(!lastFrameTime) lastFrameTime = timestamp;
    const dt = timestamp - lastFrameTime;
    lastFrameTime = timestamp;
    const frameScale = dt / 16.6667; // normalize to 60fps steps

    if(phase === 'free'){
      velocity *= Math.pow(FRICTION, frameScale);
      currentRotation += velocity * frameScale;
      if(velocity <= BRAKE_THRESHOLD){
        phase = 'brake';
        brakeStartVelocity = velocity;
        brakeElapsed = 0;
      }
    } else if(phase === 'brake'){
      brakeElapsed += dt;
      const t = Math.min(brakeElapsed / BRAKE_DURATION, 1);
      velocity = brakeStartVelocity * (1 - t);
      currentRotation += velocity * frameScale;
      if(t >= 1){
        velocity = 0;
        phase = 'done';
      }
    }

    // tick detection
    if(options.length > 0){
      const seg = (Math.PI*2) / options.length;
      const segIndex = Math.floor((currentRotation % (Math.PI*2)) / seg);
      if(segIndex !== lastTickSeg){
        lastTickSeg = segIndex;
        triggerTick();
      }
    }

    drawWheel(currentRotation);

    // ambient confetti while spinning
    if(Math.random() < 0.5){
      const rect = wheelCanvas.getBoundingClientRect();
      spawnConfetti(1, rect.left + rect.width/2 + (Math.random()-0.5)*rect.width, rect.top + rect.height/2 + (Math.random()-0.5)*rect.height, false);
    }

    if(phase === 'done'){
      finishSpin();
      return;
    }
    requestAnimationFrame(spinLoop);
  }

  function finishSpin(){
    spinning = false;
    spinBtn.disabled = options.length < 2;
    resetBtn.disabled = false;
    lastFrameTime = null;

    const idx = pickResultIndex();
    const winner = options[idx];
    resultEl.textContent = '🎉 ' + winner + ' 🎉';
    resultEl.classList.remove('pop');
    void resultEl.offsetWidth;
    resultEl.classList.add('pop');

    const rect = wheelCanvas.getBoundingClientRect();
    spawnConfetti(28, rect.left + rect.width/2, rect.top + rect.height/2, true);
  }

  spinBtn.addEventListener('click', startSpin);
  wheelCanvas.addEventListener('click', ()=>{ if(!spinning) startSpin(); });

  function startSpin(){
    if(spinning) return;
    if(options.length < 2) return;
    spinning = true;
    spinBtn.disabled = true;
    resetBtn.disabled = true;
    resultEl.textContent = '';
    resultEl.classList.remove('pop');

    velocity = 0.22 + Math.random()*0.13; // 0.22 - 0.35 rad/frame
    phase = 'free';
    lastTickSeg = Math.floor((currentRotation % (Math.PI*2)) / ((Math.PI*2)/Math.max(options.length,1)));
    lastFrameTime = null;
    requestAnimationFrame(spinLoop);
  }

  // ---------- Seed a few starter options ----------
  ['Pizza','Sushi','Burger','Kebap'].forEach(o=>options.push(o));
  renderOptions();
  drawWheel(0);

})();
</script>
</body>
</html>
